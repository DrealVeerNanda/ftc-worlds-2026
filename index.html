<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTC Worlds 2026 — Multiview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e8003d; --bg: #080b10; --surface: #0d1219;
    --border: #1c2530; --text: #d6e4f0; --muted: #4a6070; --accent: #00b4d8;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; position: relative; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.35;} }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.08em; color: #fff; }
  h1 span { color: var(--red); }
  .meta { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 1px; }
  .controls { display: flex; gap: 6px; align-items: center; }
  .btn { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; border-radius: 2px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { border-color: var(--red); color: var(--red); background: rgba(232,0,61,0.07); }
  
  .dropdown-wrapper { position: relative; }
  .dropdown-menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100; min-width: 180px; }
  .dropdown-menu.show { display: block; }
  .stream-opt { display: flex; align-items: center; gap: 8px; font-size: 0.6rem; margin-bottom: 8px; color: var(--text); cursor: pointer; }
  .stream-opt:last-child { margin-bottom: 0; }
  .stream-opt input { cursor: pointer; }

  #grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); gap: 2px; padding: 2px; overflow: hidden; background: #020408; transition: all 0.3s ease; }
  /* Dynamic grid classes based on active streams */
  #grid.l-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  #grid.l-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
  #grid.l-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
  #grid.l-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
  #grid.l-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
  #grid.l-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
  
  #grid.l-featured { grid-template-columns: 2fr 1fr; grid-template-rows: repeat(3, 1fr); }
  #grid.l-featured .cell:first-child { grid-row: 1 / 4; }
  #grid.l-3x2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); }
  #grid.l-stack { grid-template-columns: 1fr; grid-template-rows: repeat(6, 1fr); }

  .cell { position: relative; overflow: hidden; background: #000; border: 1px solid var(--border); border-radius: 1px; }
  .cell.solo { position: fixed !important; inset: 44px 0 26px 0 !important; z-index: 50; border-color: var(--red) !important; border-radius: 0; }
  .cell iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: block; }

  .cell-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; padding: 20px 10px 7px; background: linear-gradient(to top, rgba(8,11,16,0.92) 0%, transparent 100%); display: flex; align-items: center; justify-content: space-between; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .cell:hover .cell-bar, .cell.solo .cell-bar, .cell:has(.schedule-overlay.open) .cell-bar { opacity: 1; pointer-events: all; }
  .bar-name { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; letter-spacing: 0.1em; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
  .bar-btns { display: flex; gap: 5px; }
  .bar-btn { font-family: 'DM Mono', monospace; font-size: 0.55rem; padding: 3px 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(8,11,16,0.75); color: var(--text); border-radius: 2px; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: all 0.12s; backdrop-filter: blur(4px); text-decoration: none;}
  .bar-btn:hover { border-color: var(--red); color: var(--red); }
  .bar-btn.focused { border-color: var(--red); color: var(--red); }

  /* Schedule Overlay */
  .schedule-overlay { position: absolute; top: 0; right: 0; bottom: 0; width: 300px; max-width: 80%; background: rgba(13, 18, 25, 0.95); border-left: 1px solid var(--border); z-index: 10; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
  .schedule-overlay.open { transform: translateX(0); }
  .sched-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3); }
  .sched-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: #fff; letter-spacing: 0.05em; }
  .sched-close { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; }
  .sched-close:hover { color: var(--red); }
  .sched-content { padding: 10px; flex: 1; overflow-y: auto; font-size: 0.6rem; color: var(--text); }
  .match-item { padding: 8px; border: 1px solid var(--border); margin-bottom: 5px; border-radius: 3px; background: rgba(255,255,255,0.02); }
  .match-item .time { color: var(--accent); font-weight: bold; margin-bottom: 3px; }

  /* Analytics Modal */
  .analytics-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(10px); }
  .analytics-modal.show { opacity: 1; pointer-events: all; }
  .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; width: 600px; max-width: 90%; max-height: 85%; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
  .modal-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.05em; color: #fff; }
  .modal-close { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; transition: color 0.15s; }
  .modal-close:hover { color: var(--red); }
  
  .team-tabs { display: flex; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
  .team-tab { padding: 10px 15px; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; flex: 1; text-align: center; }
  .team-tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .team-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0, 180, 216, 0.05); font-weight: bold; }
  
  .modal-body { padding: 20px; flex: 1; overflow-y: auto; }
  .team-view { display: none; }
  .team-view.active { display: block; }
  
  .stat-grid-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
  .stat-grid-bot { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px; border-radius: 3px; text-align: center; }
  .stat-val { font-size: 1.2rem; font-weight: bold; color: #fff; margin-bottom: 3px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
  .stat-lbl { font-size: 0.5rem; color: var(--muted); text-transform: uppercase; }
  
  .sched-section h4 { color: #fff; margin-bottom: 10px; font-size: 0.8rem; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
  .pred-win { color: #4CAF50; font-weight: bold; }
  .pred-loss { color: var(--red); font-weight: bold; }

  .rank-proj { display: flex; align-items: center; gap: 10px; background: rgba(0,180,216,0.06); border: 1px solid rgba(0,180,216,0.2); border-radius: 3px; padding: 10px 14px; margin-bottom: 16px; }
  .rank-proj-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); line-height: 1; }
  .rank-proj-arrow { font-size: 1rem; }
  .rank-proj-arrow.up { color: #4CAF50; }
  .rank-proj-arrow.down { color: var(--red); }
  .rank-proj-arrow.same { color: var(--muted); }
  .rank-proj-detail { font-size: 0.55rem; color: var(--muted); line-height: 1.5; }
  .rank-proj-detail strong { color: var(--text); }

  .pick-table { width: 100%; border-collapse: collapse; font-size: 0.58rem; }
  .pick-table th { color: var(--muted); text-align: left; padding: 5px 6px; border-bottom: 1px solid var(--border); font-weight: normal; text-transform: uppercase; font-size: 0.5rem; }
  .pick-table td { padding: 6px 6px; border-bottom: 1px solid rgba(28,37,48,0.6); color: var(--text); }
  .pick-table tr:hover td { background: rgba(255,255,255,0.02); }
  .pick-table tr.our-team td { background: rgba(0,180,216,0.06); }
  .badge { display: inline-block; font-size: 0.42rem; padding: 1px 4px; border-radius: 2px; margin-left: 3px; font-weight: bold; text-transform: uppercase; vertical-align: middle; }
  .badge-auto { background: rgba(255,200,0,0.15); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
  .badge-endgame { background: rgba(160,80,255,0.15); color: #a050ff; border: 1px solid rgba(160,80,255,0.3); }
  .badge-allround { background: rgba(0,180,216,0.15); color: var(--accent); border: 1px solid rgba(0,180,216,0.3); }
  .badge-watch { background: rgba(255,120,0,0.15); color: #ff7800; border: 1px solid rgba(255,120,0,0.3); }
  .pick-section-label { font-size: 0.5rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em; margin: 14px 0 6px; }
  #alliance-view-container { display: none; }
  #alliance-view-container.active { display: block; }

  footer { padding: 4px 14px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 14px; font-size: 0.56rem; color: var(--muted); letter-spacing: 0.04em; flex-shrink: 0; }
  .fi { display: flex; align-items: center; gap: 5px; }
  .fd { width: 5px; height: 5px; border-radius: 50%; }
  .fd.r { background: var(--red); box-shadow: 0 0 5px var(--red); animation: blink 1.4s ease-in-out infinite; }
  kbd { font-family:'DM Mono',monospace; font-size:0.5rem; padding:1px 5px; border:1px solid var(--border); border-radius:2px; background:rgba(255,255,255,0.04); }
</style>
<!-- Load YouTube Iframe API to force streams to play when backgrounded -->
<script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<header>
  <div class="brand">
    <div class="live-dot"></div>
    <div>
      <h1><span>FTC</span> WORLDS 2026 — MULTIVIEW</h1>
      <div class="meta">FIRST Championship · Houston, TX · Thu Apr 30 · All 6 Divisions</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" onclick="toggleAnalytics()">📊 Team Analytics</button>
    <div class="divider" style="width:1px; height:16px; background:var(--border);"></div>
    <div class="dropdown-wrapper">
      <button class="btn" id="streamToggleBtn" onclick="toggleStreamMenu()">📺 Streams ▾</button>
      <div id="streamMenu" class="dropdown-menu">
        <!-- populated by JS -->
      </div>
    </div>
    <div class="divider" style="width:1px; height:16px; background:var(--border);"></div>
    <button class="btn active" id="btn-grid" onclick="setLayout('',this)">Grid</button>
    <button class="btn" onclick="setLayout('l-featured',this)">Featured</button>
    <button class="btn" onclick="setLayout('l-3x2',this)">3×2</button>
    <button class="btn" onclick="setLayout('l-stack',this)">Stack</button>
  </div>
</header>

<div id="grid" class="l-6"></div>

<footer>
  <div class="fi"><div class="fd r"></div> <span id="activeCount">6</span> streams live · Houston TX</div>
  <div class="fi">Hover tile for controls &nbsp;·&nbsp; <kbd>1</kbd>–<kbd>6</kbd> focus &nbsp;·&nbsp; <kbd>Esc</kbd> exit</div>
</footer>

<div class="analytics-modal" id="analyticsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Team Analytics & Predictions</h2>
      <button class="modal-close" onclick="toggleAnalytics()">✕</button>
    </div>
    <div class="team-tabs">
      <div class="team-tab active" onclick="switchTeam(0)">18221 Meta Infinity</div>
      <div class="team-tab" onclick="switchTeam(1)">16236 Juice</div>
      <div class="team-tab" onclick="switchTeam(2)">9791 Divide by Zero</div>
      <div class="team-tab" onclick="switchTeam(3)" style="border-left:1px solid var(--border);">🤝 Alliance Picks</div>
    </div>
    <div class="modal-body">
      <div id="team-views-container"></div>
      <div id="alliance-view-container"></div>
    </div>
  </div>
</div>

<script>
const STREAMS = [
  { id: 'WQUBVjbh-hM', label: 'Edison Division'     },
  { id: 'iCMhB5nhEZU', label: 'Franklin Division'   },
  { id: 'H920hSVJw7E', label: 'Goodall Division'    },
  { id: '56Elss5raPo', label: 'Jackson Division'    },
  { id: 'lZNmEpiOSx8', label: 'Lovelace Division'   },
  { id: 'oG0JzHFcf5A', label: 'Ross Division'       },
];

const TEAMS_DATA = [
  {
    num: 18221, name: "Meta Infinity",
    stats: { rank: "N/A", rp: "N/A", record: "N/A", opr: "N/A", auto: "N/A", teleop: "N/A", endgame: "N/A" },
    matches: []
  },
  {
    num: 16236, name: "Juice",
    stats: { rank: "N/A", rp: "N/A", record: "N/A", opr: "N/A", auto: "N/A", teleop: "N/A", endgame: "N/A" },
    matches: []
  },
  {
    num: 9791, name: "Divide by Zero",
    stats: { rank: "N/A", rp: "N/A", record: "N/A", opr: "N/A", auto: "N/A", teleop: "N/A", endgame: "N/A" },
    matches: []
  }
];

let activeStreams = [...STREAMS];
let soloIdx = null;
let isApiReady = false;
let players = {};
const initialSeeked = new Set();

function onYouTubeIframeAPIReady() {
  isApiReady = true;
  buildGrid();
}

function initStreamMenu() {
  const menu = document.getElementById('streamMenu');
  menu.innerHTML = '';
  STREAMS.forEach((s, i) => {
    const lbl = document.createElement('label');
    lbl.className = 'stream-opt';
    lbl.innerHTML = `<input type="checkbox" checked onchange="toggleStreamVisibility('${s.id}', this.checked)"> ${s.label}`;
    menu.appendChild(lbl);
  });
}

function toggleStreamMenu() {
  document.getElementById('streamMenu').classList.toggle('show');
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.dropdown-wrapper') && e.target.id !== 'streamToggleBtn') {
    document.getElementById('streamMenu').classList.remove('show');
  }
});

function toggleStreamVisibility(id, isVisible) {
  if (isVisible) {
    const stream = STREAMS.find(s => s.id === id);
    if (stream && !activeStreams.find(s => s.id === id)) {
      activeStreams.push(stream);
      // Sort to maintain original order
      activeStreams.sort((a, b) => STREAMS.indexOf(a) - STREAMS.indexOf(b));
    }
  } else {
    activeStreams = activeStreams.filter(s => s.id !== id);
  }
  document.getElementById('activeCount').innerText = activeStreams.length;
  buildGrid();
}

function generateScheduleHTML(streamLabel) {
  const now = new Date();
  let matchesHTML = '';
  let startTime = new Date();
  startTime.setHours(8, 0, 0, 0);

    matchesHTML += `
      <div class="match-item" style="opacity: 0.7; text-align: center; padding: 20px;">
        <span style="color:var(--muted); font-size:0.85rem;">Live division schedule pending...</span>
      </div>
    `;
  
  if(matchesHTML === '') {
    matchesHTML = '<p>No more matches today!</p>';
  }
  return matchesHTML;
}

function buildGrid() {
  if (!isApiReady) return; // Grid builds when YouTube API loads

  const grid = document.getElementById('grid');
  grid.innerHTML = ''; 
  
  // Clean up old players
  for (let key in players) {
    try { players[key].destroy(); } catch(e) {}
  }
  players = {};
  
  // update dynamic grid class based on count
  const lClass = activeStreams.length <= 6 ? `l-${activeStreams.length}` : 'l-6';
  if(!grid.className.includes('l-featured') && !grid.className.includes('l-stack') && !grid.className.includes('l-3x2')) {
    grid.className = lClass;
  }

  activeStreams.forEach((s, i) => {
    const origIdx = STREAMS.indexOf(s);
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `c${origIdx}`;

    // Absolute wrapper for YT player iframe
    const ytWrapper = document.createElement('div');
    ytWrapper.style.position = 'absolute';
    ytWrapper.style.inset = '0';
    ytWrapper.style.width = '100%';
    ytWrapper.style.height = '100%';
    
    const ytContainer = document.createElement('div');
    ytContainer.id = `yt-${s.id}`;
    ytWrapper.appendChild(ytContainer);

    const bar = document.createElement('div');
    bar.className = 'cell-bar';
    bar.innerHTML = `
      <span class="bar-name">${s.label}</span>
      <span class="bar-btns">
        <button class="bar-btn" onclick="toggleSchedule(${origIdx})">📅 Sched</button>
        <button class="bar-btn" id="sbtn${origIdx}" onclick="toggleSolo(${origIdx})">⛶ Focus</button>
        <a class="bar-btn" href="https://youtube.com/watch?v=${s.id}" target="_blank" rel="noopener">↗ YT</a>
      </span>
    `;

    const schedOverlay = document.createElement('div');
    schedOverlay.className = 'schedule-overlay';
    schedOverlay.id = `sched${origIdx}`;
    
    schedOverlay.innerHTML = `
      <div class="sched-header">
        <h3>${s.label} Sched</h3>
        <button class="sched-close" onclick="toggleSchedule(${origIdx})">✕</button>
      </div>
      <div class="sched-content">
        <div style="margin-bottom:10px; padding:8px; background:rgba(0,180,216,0.1); border:1px solid var(--accent); border-radius:3px; text-align:center;">
          <a href="https://ftc-events.firstinspires.org/" target="_blank" style="color:var(--accent); text-decoration:none;">View Official FTC-Events ↗</a>
        </div>
        ${generateScheduleHTML(s.label)}
      </div>
    `;

    cell.appendChild(ytWrapper);
    cell.appendChild(schedOverlay);
    cell.appendChild(bar);
    grid.appendChild(cell);

    // Clear seek tracking so this player gets a fresh live-edge seek on first play
    initialSeeked.delete(s.id);

    // Initialize YouTube Iframe API Player
    players[s.id] = new YT.Player(`yt-${s.id}`, {
      videoId: s.id,
      playerVars: {
        autoplay: 1,
        mute: 1,
        playsinline: 1,
        disablekb: 1,
        controls: 1
      },
      events: {
        'onReady': (event) => {
          event.target.seekTo(999999, true);
          event.target.playVideo();
        },
        'onStateChange': (event) => {
          if (event.data === YT.PlayerState.PLAYING && !initialSeeked.has(s.id)) {
            // Catch first play in case onReady fired before the live stream was ready
            initialSeeked.add(s.id);
            event.target.seekTo(999999, true);
          }
          // If the player pauses and we didn't want it to, force it to resume playing
          // This prevents background tab throttling from pausing the live stream
          if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.UNSTARTED) {
            event.target.playVideo();
          }
        }
      }
    });
  });
  
  if(soloIdx !== null && !activeStreams.find(s => STREAMS.indexOf(s) === soloIdx)) {
    // focused stream was removed
    soloIdx = null; 
  }
}

function toggleSchedule(idx) {
  const overlay = document.getElementById(`sched${idx}`);
  if (overlay) overlay.classList.toggle('open');
}

function toggleSolo(idx) {
  const cell = document.getElementById(`c${idx}`);
  const btn = document.getElementById(`sbtn${idx}`);
  if (!cell) return;
  
  if (soloIdx === idx) {
    cell.classList.remove('solo');
    if (btn) { btn.textContent = '⛶ Focus'; btn.classList.remove('focused'); }
    soloIdx = null;
  } else {
    if (soloIdx !== null) {
      document.getElementById(`c${soloIdx}`)?.classList.remove('solo');
      const ob = document.getElementById(`sbtn${soloIdx}`);
      if (ob) { ob.textContent = '⛶ Focus'; ob.classList.remove('focused'); }
    }
    cell.classList.add('solo');
    if (btn) { btn.textContent = '✕ Exit'; btn.classList.add('focused'); }
    soloIdx = idx;
  }
}

function setLayout(cls, btn) {
  const grid = document.getElementById('grid');
  // if clearing layout, revert to default l-X
  if (!cls) {
    grid.className = activeStreams.length <= 6 ? `l-${activeStreams.length}` : 'l-6';
  } else {
    grid.className = cls;
  }
  document.querySelectorAll('.controls > button.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// When returning to this tab, iframes steal focus and swallow keyboard events.
// Reclaim focus on visibility change and on window focus so hotkeys keep working.
// Also seek all players to the live edge so streams aren't behind.
function reclaimFocus() {
  if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
    document.activeElement.blur();
  }
  window.focus();
}

function seekAllToLive() {
  Object.values(players).forEach(player => {
    try {
      if (typeof player.seekTo === 'function') {
        // Seeking to a very large value is the reliable way to jump to the live edge;
        // YouTube clips it to the current live position regardless of getDuration()
        player.seekTo(999999, true);
      }
    } catch(e) {}
  });
}

function onTabReturn() {
  reclaimFocus();
  seekAllToLive();
}

document.addEventListener('visibilitychange', () => { if (!document.hidden) onTabReturn(); });
window.addEventListener('focus', onTabReturn);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (soloIdx !== null) toggleSolo(soloIdx);
    const modal = document.getElementById('analyticsModal');
    if (modal && modal.classList.contains('show')) toggleAnalytics();
  }
  const n = parseInt(e.key);
  if (n >= 1 && n <= 6) {
    const s = STREAMS[n - 1];
    if (activeStreams.includes(s)) toggleSolo(n - 1);
  }
  // Arrow keys / J / L seek the solo player when focus is outside the iframe
  if (soloIdx !== null && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','j','l','k',' '].includes(e.key)) {
    const player = players[STREAMS[soloIdx]?.id];
    if (player && typeof player.getCurrentTime === 'function') {
      e.preventDefault();
      if (e.key === 'ArrowLeft')  player.seekTo(player.getCurrentTime() - 5,  true);
      if (e.key === 'ArrowRight') player.seekTo(player.getCurrentTime() + 5,  true);
      if (e.key === 'j')          player.seekTo(player.getCurrentTime() - 10, true);
      if (e.key === 'l')          player.seekTo(player.getCurrentTime() + 10, true);
      if (e.key === 'ArrowUp')    player.setVolume(Math.min(100, player.getVolume() + 10));
      if (e.key === 'ArrowDown')  player.setVolume(Math.max(0,   player.getVolume() - 10));
      if (e.key === 'k' || e.key === ' ') {
        player.getPlayerState() === 1 ? player.pauseVideo() : player.playVideo();
      }
    }
  }
});

// Analytics Functions
let isLoadingLiveStats = false;
let hasLiveStats = false;
let divisionPicksData = {}; // keyed by eventCode -> [{teamNumber, name, opr, auto, teleop, endgame, rank, rp}]

async function fetchLiveStats() {
  const teams = [18221, 16236, 9791];
  
  const fetchTeam = async (teamNum) => {
    const query = `
      query {
        team: teamByNumber(number: ${teamNum}) {
          name
          events(season: 2025) {
            eventCode
            stats { ... on TeamEventStats2025 { rank rp } }
          }
          quickStats(season: 2025) { tot { value } auto { value } dc { value } eg { value } }
          matches(season: 2025) {
            eventCode
            match {
              hasBeenPlayed description scheduledStartTime actualStartTime
              scores { ... on MatchScores2025 { red { totalPoints } blue { totalPoints } } }
              teams { teamNumber alliance }
            }
          }
        }
      }
    `;
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 6000);
    const res = await fetch("https://api.ftcscout.org/graphql", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query }),
      signal: controller.signal
    });
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error("FTC Scout API error");
    const { data } = await res.json();
    return data?.team;
  };

  try {
    const results = await Promise.all(teams.map(t => fetchTeam(t).catch(e => null)));
    
    let validResults = 0;
    
    // Pass 1: Collect all unique team numbers needed for predictions
    const uniqueTeams = new Set();
    results.forEach(d => {
      if (!d || !d.matches) return;
      validResults++;
      const eventMatches = d.matches.filter(m => m.eventCode && m.eventCode.startsWith('FTCCMP'));
      eventMatches.forEach(mp => {
        if (mp.match && !mp.match.hasBeenPlayed && mp.match.teams) {
          mp.match.teams.forEach(t => uniqueTeams.add(t.teamNumber));
        }
      });
    });
    
    if (validResults === 0) {
      throw new Error("All API requests failed or returned empty data.");
    }
    
    // Pass 2: Batch fetch OPRs for all teams in upcoming matches
    const oprDict = {};
    if (uniqueTeams.size > 0) {
      const teamsArr = Array.from(uniqueTeams);
      // Batch up to 100 teams per query to avoid massive payloads, but usually there are < 50
      let batchQuery = 'query { ';
      teamsArr.forEach(t => {
        batchQuery += `t${t}: teamByNumber(number: ${t}) { quickStats(season: 2025) { tot { value } } } `;
      });
      batchQuery += '}';
      
      try {
        const batchController = new AbortController();
        setTimeout(() => batchController.abort(), 8000);
        const res = await fetch("https://api.ftcscout.org/graphql", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: batchQuery }),
          signal: batchController.signal
        });
        const batchData = await res.json();
        if (batchData.data) {
          for (const key in batchData.data) {
            const teamNum = parseInt(key.substring(1));
            const qs = batchData.data[key]?.quickStats;
            oprDict[teamNum] = qs?.tot?.value || 0;
          }
        }
      } catch(e) {
        console.warn("Failed to batch fetch opponent OPRs", e);
      }
    }
    
    // Pass 3: Process results and calculate predictions
    results.forEach((d, idx) => {
      if (!d) return;
      
      let opr = d.quickStats?.tot?.value || 0;
      let auto = d.quickStats?.auto?.value || 0;
      let dc = d.quickStats?.dc?.value || 0;
      let eg = d.quickStats?.eg?.value || 0;
      oprDict[teams[idx]] = opr; // Ensure our team's OPR is perfectly tracked
      
      let rank = "N/A";
      let rp = "N/A";
      let cmpEventCode = null;
      if (d.events) {
        // Prefer the CMP event that has rank stats; fall back to any CMP event
        const cmpEventWithRank = d.events.find(e => e.eventCode && e.eventCode.startsWith('FTCCMP') && e.stats && e.stats.rank);
        const anyCmpEvent = d.events.find(e => e.eventCode && e.eventCode.startsWith('FTCCMP'));
        const cmpEvent = cmpEventWithRank || anyCmpEvent;
        if (cmpEvent) {
          cmpEventCode = cmpEvent.eventCode;
          if (cmpEvent.stats) {
            rank = cmpEvent.stats.rank;
            rp = cmpEvent.stats.rp;
          }
        }
      }

      let pastMatches = [];
      let wins = 0, losses = 0, ties = 0;

      if (d.matches && d.matches.length > 0) {
        // Use exact event code to avoid mixing matches from different CMP divisions
        const eventMatches = d.matches.filter(m => cmpEventCode ? m.eventCode === cmpEventCode : false);
        
        eventMatches.forEach(mp => {
          const match = mp.match;
          if (!match) return;
          
          let ourAlliance = null;
          let opp1 = null, opp2 = null;
          let teammate = null;
          
          if (match.teams) {
            const ourTeam = match.teams.find(t => t.teamNumber === teams[idx]);
            if (ourTeam) ourAlliance = ourTeam.alliance;
            
            match.teams.forEach(t => {
              if (t.teamNumber !== teams[idx]) {
                if (t.alliance === ourAlliance) teammate = t.teamNumber;
                else if (!opp1) opp1 = t.teamNumber;
                else opp2 = t.teamNumber;
              }
            });
          }
          
          let result = "UPCOMING";
          let scoreStr = "Pending";
          let isPast = false;
          let winProb = 50;
          let pred = "TIE";
          
          if (match.hasBeenPlayed && match.scores) {
            let ourScore = ourAlliance === 'Red' ? match.scores.red?.totalPoints : match.scores.blue?.totalPoints;
            let theirScore = ourAlliance === 'Red' ? match.scores.blue?.totalPoints : match.scores.red?.totalPoints;
            
            if (ourScore > theirScore) { result = "WIN"; wins++; }
            else if (ourScore < theirScore) { result = "LOSS"; losses++; }
            else { result = "TIE"; ties++; }
            
            scoreStr = `${ourScore}-${theirScore}`;
            isPast = true;
          } else {
            // Calculate predictions based on OPR
            const ourOpr = oprDict[teams[idx]] || 0;
            const teammateOpr = oprDict[teammate] || 0;
            const opp1Opr = oprDict[opp1] || 0;
            const opp2Opr = oprDict[opp2] || 0;
            console.log(`Match ${match.description}: us=${ourOpr.toFixed(1)} mate=${teammateOpr.toFixed(1)} opp1=${opp1Opr.toFixed(1)} opp2=${opp2Opr.toFixed(1)} (team${teams[idx]} vs ${teammate},${opp1},${opp2})`);
            
            const ourAllianceScore = ourOpr + teammateOpr;
            const oppAllianceScore = opp1Opr + opp2Opr;
            const totalScore = ourAllianceScore + oppAllianceScore;
            
            if (totalScore > 0) {
              winProb = Math.round((ourAllianceScore / totalScore) * 100);
            }
            if (winProb > 50) pred = "WIN";
            else if (winProb < 50) pred = "LOSS";
            else pred = "TIE";
          }
          
          // Format scheduled start time as local time (e.g. "2:15 PM")
          let startTime = null;
          const rawTime = match.scheduledStartTime || match.actualStartTime;
          if (rawTime) {
            try {
              startTime = new Date(rawTime).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            } catch(e) {}
          }

          pastMatches.push({
            num: match.description || "Match",
            time: isPast ? "Past" : "Upcoming",
            startTime: startTime,
            isPast: isPast,
            result: result,
            score: scoreStr,
            winProb: isPast ? null : winProb,
            pred: isPast ? null : pred,
            opp1: opp1 || 'N/A',
            opp2: opp2 || 'N/A'
          });
        });
      }
      
      // Calculate projected rank after upcoming matches
      let projectedRank = rank;
      if (typeof rank === 'number') {
        const currentRp = typeof rp === 'number' ? rp : parseFloat(rp) || 0;
        const playedCount = wins + losses + ties;
        let simWins = wins, simLosses = losses, simTies = ties;
        let totalRp = currentRp * playedCount;
        pastMatches.forEach(m => {
          if (!m.isPast) {
            const prob = m.winProb / 100;
            totalRp += prob >= 0.5 ? 2 * prob : 0; // expected RP per match
            if (m.winProb > 55) simWins++;
            else if (m.winProb < 45) simLosses++;
            else simTies++;
          }
        });
        const simPlayed = simWins + simLosses + simTies;
        const simAvgRp = simPlayed > 0 ? totalRp / simPlayed : currentRp;
        // Rough rank projection: assume ~0.6 RP/rank-position shift at this stage
        const rpDelta = simAvgRp - currentRp;
        projectedRank = Math.max(1, Math.round(rank - rpDelta * 5));
      }

      TEAMS_DATA[idx].name = d.name || TEAMS_DATA[idx].name;
      TEAMS_DATA[idx].stats = {
        rank: rank,
        rp: rp,
        record: `${wins}-${losses}-${ties}`,
        opr: opr, auto: auto, teleop: dc, endgame: eg,
        projectedRank: projectedRank,
        cmpEventCode: cmpEventCode
      };

      // Override matches completely with API data
      TEAMS_DATA[idx].matches = pastMatches;
    });

    // Pass 4: Fetch division-wide team list for alliance picks (one query per unique division)
    const eventCodes = [...new Set(TEAMS_DATA.map(t => t.stats.cmpEventCode).filter(Boolean))];
    await Promise.all(eventCodes.map(async (evCode) => {
      try {
        const divQuery = `
          query {
            eventByCode(season: 2025, code: "${evCode}") {
              teams {
                team { number name }
                stats { ... on TeamEventStats2025 { rank rp } }
              }
            }
          }
        `;
        const divController = new AbortController();
        setTimeout(() => divController.abort(), 8000);
        const divRes = await fetch("https://api.ftcscout.org/graphql", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query: divQuery }), signal: divController.signal
        });
        const divData = await divRes.json();
        const divTeams = divData?.data?.eventByCode?.teams || [];
        divisionPicksData[evCode] = divTeams.map(t => ({
          teamNumber: t.team?.number,
          name: t.team?.name || `Team ${t.team?.number}`,
          rank: t.stats?.rank,
          rp: t.stats?.rp,
          opr: oprDict[t.team?.number] || 0
        })).sort((a, b) => (b.opr || 0) - (a.opr || 0));
      } catch(e) {
        console.warn("Failed to fetch division teams for", evCode, e);
      }
    }));

    hasLiveStats = true;
  } catch(e) {
    console.warn("Failed to fetch live stats, falling back to local data.", e);
  }
}

async function toggleAnalytics() {
  const modal = document.getElementById('analyticsModal');
  if(!modal.classList.contains('show')) {
    if (!hasLiveStats && !isLoadingLiveStats) {
      isLoadingLiveStats = true;
      document.getElementById('team-views-container').innerHTML = '<div style="text-align:center; padding: 40px; color:var(--accent);">Fetching live data from FTC Scout...</div>';
      modal.classList.add('show');
      await fetchLiveStats();
      isLoadingLiveStats = false;
      
      // If fetching completely failed and we have no match data
      if (!hasLiveStats && TEAMS_DATA[0].matches.length === 0) {
        document.getElementById('team-views-container').innerHTML = '<div style="text-align:center; padding: 40px; color:#ff4444;">FTC Scout API is currently down or overloaded.<br>Please try again in a few minutes.</div>';
      } else {
        renderTeamViews();
      }
    } else if (!isLoadingLiveStats) {
      renderTeamViews();
      modal.classList.add('show');
    } else {
      modal.classList.add('show');
    }
  } else {
    modal.classList.remove('show');
  }
}

function switchTeam(idx) {
  document.querySelectorAll('.team-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.team-view').forEach((v, i) => {
    v.classList.toggle('active', i === idx);
  });
  const allianceView = document.getElementById('alliance-view-container');
  if (allianceView) allianceView.classList.toggle('active', idx === 3);
}

function classifyTeam(t, divAvgOpr) {
  const badges = [];
  if (t.opr > divAvgOpr * 1.15) badges.push('<span class="badge badge-allround">All-Round</span>');
  if (t.autoOpr > divAvgOpr * 0.35) badges.push('<span class="badge badge-auto">Auto</span>');
  if (t.egOpr > divAvgOpr * 0.12) badges.push('<span class="badge badge-endgame">Endgame</span>');
  return badges.join('');
}

function renderAlliancePicks() {
  const allianceContainer = document.getElementById('alliance-view-container');
  if (!allianceContainer) return;

  const ourTeamNumbers = TEAMS_DATA.map(t => t.num);

  // Build one section per division our teams are in
  const eventCodes = [...new Set(TEAMS_DATA.map(t => t.stats?.cmpEventCode).filter(Boolean))];

  if (eventCodes.length === 0 || Object.keys(divisionPicksData).length === 0) {
    allianceContainer.innerHTML = '<p style="color:var(--muted); font-size:0.6rem; padding:20px 0; text-align:center;">Division data not available yet — open Team Analytics first to load live data.</p>';
    return;
  }

  let html = '';

  eventCodes.forEach(evCode => {
    const divTeams = divisionPicksData[evCode];
    if (!divTeams || divTeams.length === 0) return;

    // Find which of our teams are in this division
    const ourTeamsInDiv = TEAMS_DATA.filter(t => t.stats?.cmpEventCode === evCode);
    const divLabel = ourTeamsInDiv.map(t => `${t.num} ${t.name}`).join(' / ');

    const avgOpr = divTeams.reduce((s, t) => s + t.opr, 0) / (divTeams.length || 1);

    // Top picks: high OPR teams not already our teams
    const candidates = divTeams.filter(t => !ourTeamNumbers.includes(t.teamNumber));
    const top10 = candidates.slice(0, 10);

    // "Keep an eye on": teams ranked 5-20 by OPR but strong in auto or endgame
    // (good complement picks, not necessarily top raw OPR)
    const watchList = candidates
      .filter((t, i) => i >= 3 && i < 25 && (t.autoOpr > avgOpr * 0.3 || t.egOpr > avgOpr * 0.1))
      .slice(0, 8);

    html += `<div style="margin-bottom:24px;">`;
    html += `<div style="font-size:0.65rem; color:var(--accent); font-family:'Bebas Neue',sans-serif; letter-spacing:0.08em; margin-bottom:2px;">${evCode}</div>`;
    html += `<div style="font-size:0.5rem; color:var(--muted); margin-bottom:12px;">${divLabel}</div>`;

    html += `<div class="pick-section-label">🏆 Top Captain-Compatible Picks (by OPR)</div>`;
    html += `<table class="pick-table"><thead><tr>
      <th>Rank</th><th>Team</th><th>OPR</th><th>Tags</th>
    </tr></thead><tbody>`;

    top10.forEach((t, i) => {
      const isOurs = ourTeamNumbers.includes(t.teamNumber);
      const opr = t.opr ? t.opr.toFixed(1) : '—';
      const rankStr = t.rank ? `#${t.rank}` : `#${i + 1}`;
      html += `<tr class="${isOurs ? 'our-team' : ''}">
        <td style="color:var(--muted);">${rankStr}</td>
        <td><strong style="color:var(--text);">${t.teamNumber}</strong> <span style="color:var(--muted); font-size:0.5rem;">${t.name}</span></td>
        <td style="color:var(--accent);">${opr}</td>
        <td>${i < 3 ? '<span class="badge badge-allround">Top Pick</span>' : ''}${i >= 3 && t.opr > avgOpr * 1.1 ? '<span class="badge badge-watch">Strong</span>' : ''}</td>
      </tr>`;
    });

    html += `</tbody></table>`;

    if (watchList.length > 0) {
      html += `<div class="pick-section-label" style="margin-top:16px;">👀 Keep an Eye On (complementary picks)</div>`;
      html += `<table class="pick-table"><thead><tr>
        <th>Rank</th><th>Team</th><th>OPR</th><th>Why</th>
      </tr></thead><tbody>`;
      watchList.forEach(t => {
        const opr = t.opr ? t.opr.toFixed(1) : '—';
        const rankStr = t.rank ? `#${t.rank}` : '—';
        const why = t.opr > avgOpr * 1.05
          ? '<span class="badge badge-allround">Solid OPR</span>'
          : '<span class="badge badge-watch">Sleeper</span>';
        html += `<tr>
          <td style="color:var(--muted);">${rankStr}</td>
          <td><strong style="color:var(--text);">${t.teamNumber}</strong> <span style="color:var(--muted); font-size:0.5rem;">${t.name}</span></td>
          <td style="color:var(--accent);">${opr}</td>
          <td>${why}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }

    html += `<p style="font-size:0.48rem; color:var(--muted); margin-top:10px;">Sorted by OPR (Offensive Power Rating) from FTC Scout. OPR data for opponent teams may be season-wide, not division-specific.</p>`;
    html += `</div>`;
  });

  allianceContainer.innerHTML = html || '<p style="color:var(--muted); font-size:0.6rem; padding:20px 0;">No division data loaded.</p>';
}
